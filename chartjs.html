<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="display: flex;">

    <div>
        <canvas id="myChart" style="position: relative; height:40vh; width:40vw"></canvas>
    </div>
     <div>
        <canvas id="myChart2" style="position: relative; height:40vh; width:40vw"></canvas>
    </div>


</body>
<script>
    const labelsLinha = ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];

    const dataLinha = {
        labels: labelsLinha,
        datasets: [
            {
                label: 'Temperatura',
                data: [30, 29, 28, 25, 22, 23],
                borderColor: 'rgb(107, 142, 35)',
                backgroundColor: 'rgb(107, 142, 35)',
                tension: 0.3
            },
            {
                label: 'Umidade',
                data: [80, 82, 80, 85, 80, 83],
                borderColor: 'rgb(138, 43, 226)',
                backgroundColor: 'rgb(138, 43, 226)',
                tension: 0.3
            }
        ]
    };

    const config = {
        type: 'line',
        data: dataLinha,
        options: {}

    };

    const labelsBarra = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'];

    const dataBarra = {
        labels: labelsBarra,
        datasets: [
            {
                label: 'Temperatura Média',
                data: [22, 24, 27, 23, 20, 18],
                backgroundColor: 'rgb(107, 142, 35)'
            },
            {
                label: 'Umidade Média',
                data: [90, 89, 93, 87, 88, 82],
                backgroundColor: 'rgb(138, 43, 226)'
            }
        ]
    };

    const config2 = {
        type: 'bar',
        data: dataBarra,
        options: {}
    };


    const myChart = new Chart(
        document.getElementById('myChart'),
        config
    );

    const myChart2 = new Chart(
        document.getElementById('myChart2'),
        config2
    );
</script>

</html>
